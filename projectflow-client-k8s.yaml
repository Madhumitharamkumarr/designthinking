apiVersion: apps/v1
kind: Deployment
metadata:
  name: projectflow-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: projectflow-client
  template:
    metadata:
      labels:
        app: projectflow-client
    spec:
      containers:
        - name: projectflow-client
          image: projectflow-client:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: projectflow-client
spec:
  type: NodePort
  selector:
    app: projectflow-client
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
